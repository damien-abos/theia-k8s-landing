server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # config.js est injecté au runtime (ConfigMap) ; ne jamais le mettre en cache.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback : /callback (retour OIDC) et tout chemin client-side → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
