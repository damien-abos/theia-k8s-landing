version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"

  # Docker (image de base du Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"

  # npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "npm"
      include: "scope"
    groups:
      # Packages theia-cloud épinglés sur le theia_cloud_version de l'IaC :
      # à mettre à jour de façon contrôlée (tous types regroupés).
      theia-cloud:
        patterns:
          - "@eclipse-theiacloud/*"
      # Reste des dépendances : minor/patch regroupés.
      other:
        patterns:
          - "*"
        exclude-patterns:
          - "@eclipse-theiacloud/*"
        update-types:
          - "minor"
          - "patch"
