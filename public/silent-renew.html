<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Silent renew</title>
    <!-- oidc-client-ts is exposed as UMD for this lightweight iframe page, which does
         not load the React bundle. signinSilentCallback() reads the URL and posts the
         result to the parent window. -->
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@3/dist/browser/oidc-client-ts.min.js"></script>
    <script>
      new oidc.UserManager({}).signinSilentCallback().catch(function (err) {
        console.error('OIDC silent renew failed', err);
      });
    </script>
  </head>
  <body></body>
</html>
